services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    ports:
      - "8080:80"

  ollama:
    restart: unless-stopped
